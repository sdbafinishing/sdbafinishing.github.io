</head>
<body>

      <a href="#/scoring" class="nav-link" data-page="scoring">

    </div>
    <div class="navbar-right">
      <!-- Connect Event Folder (grants browser permission to read/write files) -->
      <div class="navbar-folders" id="navFolders">
        <button class="btn-icon" id="btnConnectSource" onclick="window._connectFolder('source')" title="Connect event folder (required for file read/write)">
          <i class="material-icons" style="font-size:18px;">folder_open</i>
        </button>
        <span id="btnConnectLabel" style="font-size:10px; color:rgba(255,255,255,0.4); max-width:60px; line-height:1.2; text-align:center;">Connect Folder</span>
      </div>

        <i class="material-icons" style="font-size:18px;">login</i>
      </button>
      <button class="btn-icon" id="themeToggleBtn" onclick="window.toggleTheme()" title="Toggle theme">
        <i class="material-icons" id="themeToggleIcon">dark_mode</i>
      </button>
    </div>
  </nav>

  <!-- Main Content Area -->
  <main id="app">
    <!-- Pages rendered here by router -->
  </main>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Theme Init (before main JS to prevent flash) -->
  <script>
    (function() {
      var saved = localStorage.getItem('rdms-theme');
      if (saved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else if (!saved && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();

    window.toggleTheme = function() {
      var html = document.documentElement;
      var current = html.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      if (next === 'dark') {
        html.setAttribute('data-theme', 'dark');
      } else {
        html.removeAttribute('data-theme');
      }
      localStorage.setItem('rdms-theme', next);
      var icon = document.getElementById('themeToggleIcon');
      if (icon) icon.textContent = next === 'dark' ? 'light_mode' : 'dark_mode';
    };
  </script>

  <!-- Service Worker Registration
       Skipped on localhost because Vite's dev server doesn't play nicely
       with a cache-first SW — a 404 during HMR / port-bump can poison the
       cache and the next load returns unstyled HTML (the classic "raw
       HTML, Cmd+Shift+R fixes it" symptom). Production hosting (GitHub
       Pages) still gets the offline PWA behavior. -->
  <script>
    (function () {
      var host = window.location.hostname;
      var isLocal = host === 'localhost' || host === '127.0.0.1' || host === '0.0.0.0';
      if (isLocal) {
        // Aggressively tear down anything a previous prod-deploy build
        // (or an earlier dev session that DID register the SW) might
        // have left behind. This guarantees a clean dev session after
        // updating to a build that skips registration.
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (r) { r.unregister(); });
          }).catch(function () {});
        }
        if (window.caches && caches.keys) {
          caches.keys().then(function (keys) {
            keys.forEach(function (k) { caches.delete(k); });
          }).catch(function () {});
        }
        return;
      }
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(function () {});
      }
    })();
  </script>

  <!-- App Entry -->
</body>
</html>
